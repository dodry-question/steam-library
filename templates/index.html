<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Библиотека</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=7">
    <style>
        /* --- БАЗОВЫЕ СТИЛИ --- */
        body { font-family: 'Segoe UI', sans-serif; background-color: #1b2838; color: #c7d5e0; padding: 40px; margin: 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background-color: #171a21; padding: 15px 20px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        h1 { color: #ffffff; text-shadow: 0 0 5px #66c0f4; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        
        .user-profile { display: flex; align-items: center; justify-content: flex-end; }
        .user-info-col { display: flex; flex-direction: column; justify-content: center; line-height: 1.2; text-align: right; margin-right: 12px; }
        .user-name { font-weight: bold; color: #66c0f4; font-size: 14px; white-space: nowrap; }
        .btn-logout { color: #8f98a0; text-decoration: none; font-size: 11px; text-transform: uppercase; }
        .btn-logout:hover { color: #ffffff; text-decoration: underline; }
        
        .btn-steam { background-color: #2f363d; color: #e5e5e5; text-decoration: none; padding: 8px 16px; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; border-radius: 2px; border: 1px solid #3e464e; transition: 0.2s; font-size: 14px; }
        .btn-steam:hover { background-color: #434953; color: white; border-color: #66c0f4; }
        .steam-icon { width: 18px; height: 18px; background: url('https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg') no-repeat center/contain; }
        #copy-btn:hover { opacity: 1 !important; transform: scale(1.1); }

        /* --- Тултип для звёздочки --- */
.star-tooltip {
    position: relative;
    cursor: help;
    display: inline-block;
    font-size: 14px;
    margin-right: 5px;
}

/* Само всплывающее окно */
.star-tooltip::after {
    content: attr(data-games); /* Берет текст из атрибута */
    position: absolute;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    background: #171a21;
    color: #66c0f4;
    padding: 8px 12px;
    border-radius: 4px;
    border: 1px solid #66c0f4;
    font-size: 12px;
    white-space: nowrap; /* Текст в одну строку */
    opacity: 0;
    visibility: hidden;
    transition: 0.2s;
    pointer-events: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.8);
    z-index: 100;
    font-weight: normal;
}

/* Стрелочка вниз у тултипа */
.star-tooltip::before {
    content: '';
    position: absolute;
    bottom: 85%;
    left: 50%;
    margin-left: -5px;
    border-width: 5px;
    border-style: solid;
    border-color: #66c0f4 transparent transparent transparent;
    opacity: 0;
    visibility: hidden;
    transition: 0.2s;
}

.star-tooltip:hover::after,
.star-tooltip:hover::before {
    opacity: 1;
    visibility: visible;
    bottom: 115%; /* Небольшая анимация подъема */
}

        /* --- ПАНЕЛЬ УПРАВЛЕНИЯ --- */
        .controls { background: #101216; padding: 15px; border-radius: 4px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 20px; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.8); border: 1px solid #3e464e; }
        .controls-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

        button { padding: 8px 16px; border-radius: 2px; border: none; font-weight: normal; cursor: pointer; transition: 0.2s; color: white; font-size: 13px; font-family: 'Segoe UI', sans-serif; }
        .btn-load { background: linear-gradient( to bottom, #a4d007 5%, #536904 95%); color: #fff; text-shadow: 1px 1px 0px rgba(0,0,0,0.3); font-weight: bold; }
        .btn-load:hover { background: linear-gradient( to bottom, #b6e608 5%, #536904 95%); }
        .btn-clear { background-color: #2a2d33; color: #aaa; }
        .btn-sort { background-color: #2a3f5a; color: #66c0f4; }
        .btn-ai { background: linear-gradient(45deg, #6b2cf5, #b829e3); font-weight: bold; }

        .input-friend { padding: 8px; border-radius: 2px 0 0 2px; border: 1px solid #3e464e; background: #222b35; color: white; width: 180px; }
        .btn-friend { border-radius: 0 2px 2px 0; background-color: #67c1f5; color: #1b2838; font-weight: bold; }

        /* --- ГАЛЕРЕЯ И КАРТОЧКИ --- */
        .gallery { display: flex; flex-wrap: wrap; gap: 16px; }
        .card { 
            background-color: #16202d; width: 280px; position: relative; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 1px solid rgba(0,0,0,0.2); 
            animation: fadeIn 0.4s ease-out; display: flex; flex-direction: column; 
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.5); border-color: #66c0f4; z-index: 10; }
        
        img { width: 100%; min-height: 130px; object-fit: cover; background: #0c0f12; }
        .info { padding: 10px; flex-grow: 1; }
        h2 { font-size: 15px; margin: 0 0 5px 0; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .genres { font-size: 11px; color: #5c7e10; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playtime { font-size: 11px; color: #697885; margin-top: 2px; }
        
        .price-block { display: flex; justify-content: space-between; align-items: center; background-color: #00000033; padding: 6px 10px; margin-top: auto; }
        .price { font-size: 13px; color: #acb2b8; }
        .price.free { color: #a4d007; font-weight: bold; } 
        .discount-badge { background-color: #4c6b22; color: #beee11; padding: 1px 4px; border-radius: 1px; font-size: 13px; font-weight: bold; }

        /* --- РЕГИОНАЛЬНЫЕ ОГРАНИЧЕНИЯ --- */
        .price.region-locked { color: #ff4444; cursor: default; text-decoration: none; position: relative; font-weight: bold; }
        .price.region-locked::after {
            content: attr(data-price); position: absolute; bottom: 125%; right: 0;
            background: #171a21; color: #fff; padding: 5px 10px; border-radius: 4px;
            border: 1px solid #ff4444; font-size: 12px; white-space: nowrap;
            opacity: 0; visibility: hidden; transition: 0.2s; z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: normal;
        }
        .price.region-locked:hover::after { opacity: 1; visibility: visible; }

        /* --- БЛОК ИИ И МЕНЮ НАСТРОЕНИЯ --- */
        #ai-block { display: none; background: #121418; border: 1px solid #6b2cf5; padding: 20px; margin-bottom: 30px; border-radius: 4px; }
        #ai-block .ai-gallery { display: flex; justify-content: center; flex-wrap: wrap; gap: 16px; margin-top: 15px; }

        .mood-container { position: relative; display: inline-block; vertical-align: middle; }
        .mood-trigger { background: #2a2d33; border: 1px solid #3e464e; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; font-size: 18px; }
        .mood-trigger:hover { border-color: #6b2cf5; background: #353941; }
        .mood-trigger .arrow { font-size: 10px; color: #697885; }
        
        .mood-menu { display: none; position: absolute; top: 110%; right: 0; background: #171a21; border: 1px solid #6b2cf5; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); z-index: 2000; min-width: 220px; overflow: hidden; }
        .mood-item { padding: 10px 15px; color: #c7d5e0; cursor: pointer; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .mood-item:hover { background: #6b2cf5; color: white; }
        .mood-item.active { background: #2a3f5a; color: #66c0f4; }

        #status-bar { margin-bottom: 20px; color: #66c0f4; font-size: 14px; font-weight: bold; min-height: 20px; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #66c0f4; border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite; margin-right: 8px; vertical-align: text-bottom; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    
    <div class="header">
        
    <h1>
    Моя Библиотека
    <span id="copy-btn" onclick="copyLibrary()" title="Скопировать список игр" style="display:none; cursor:pointer; font-size: 18px; margin-left: 12px; vertical-align: middle; opacity: 0.6; transition: 0.2s;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#66c0f4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    </span>
    </h1>
    
    {% if user_id %}
        <div class="user-profile">
            <div class="user-info-col">
                <span class="user-name">{{ user_name }}</span>
                <a href="/logout" class="btn-logout">Выйти</a>

            <!-- Контейнер аватарки -->
            <div style="width: 42px; height: 42px; border: 1px solid #66c0f4; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: #171a21; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px rgba(0,0,0,0.5);">
                <img src="{{ user_avatar }}" 
                    style="max-width: 100%; max-height: 100%; object-fit: contain; display: block;" 
                    onerror="this.src='https://avatars.akamai.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'">
            </div>
        </div>
    {% else %}
        <div style="margin-left: auto;">
            <a href="/login" class="btn-steam">
                <div class="steam-icon"></div>

            </a>

    {% endif %}
</div>

    <div class="controls">
        {% if user_id %}
            <button onclick="loadLibrary()" class="btn-load" id="btn-main">Мои игры</button>
        {% endif %}
        <button onclick="clearList()" class="btn-clear">Очистить</button>
        <span style="color: #454d58;">|</span>
        <button onclick="sortGames('playtime')" class="btn-sort">По времени</button>
        <button onclick="sortGames('price')" class="btn-sort">По цене</button>

        <div class="controls-right">
            <input type="text" id="search-input" class="input-friend" placeholder="🔍 Поиск по играм..." oninput="filterGames()" style="margin-right: 15px; width: 150px;">
                <div class="mood-container">
                    <div class="mood-trigger" id="mood-trigger" title="Настроить рекомендации">
                        <span id="current-mood-emoji">💎</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="mood-menu" id="mood-menu">
                        <div class="mood-item active" data-value="hidden gems" data-emoji="💎">💎 Скрытые жемчужины</div>
                        <div class="mood-item" data-value="experimental indie" data-emoji="🧪">🧪 Экспериментальное инди</div>
                        <div class="mood-item" data-value="hardcore challenge" data-emoji="💀">💀 Хардкор и вызов</div>
                        <div class="mood-item" data-value="relaxing atmosphere" data-emoji="☕">☕ Медитативное / Отдых</div>
                        <div class="mood-item" data-value="story rich" data-emoji="📖">📖 Глубокий сюжет</div>
                    </div>
                </div>

            <button onclick="getAI()" class="btn-ai">✨ AI Совет</button>
            
            <div style="display: flex;">
                <input type="text" id="friend-id" class="input-friend" placeholder="ID друга / Ссылка">
                <button onclick="loadLibrary(true)" class="btn-friend">Найти</button>
            </div>
        </div>
    </div>

    <div id="ai-block"></div>
    <div id="status-bar"></div>
    <div class="gallery" id="container"></div>

    <script>
        let loadedGames = [];
        let isProcessing = false;
        let currentMood = "hidden gems";

        /* --- ЛОГИКА МЕНЮ НАСТРОЕНИЯ --- */
        document.getElementById('mood-trigger').addEventListener('click', function(e) {
            const menu = document.getElementById('mood-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            e.stopPropagation();
        });

        document.querySelectorAll('.mood-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.mood-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                currentMood = this.getAttribute('data-value');
                document.getElementById('current-mood-emoji').innerText = this.getAttribute('data-emoji');
                document.getElementById('mood-menu').style.display = 'none';
            });
        });

        window.addEventListener('click', function() {
            const menu = document.getElementById('mood-menu');
            if (menu) menu.style.display = 'none';
        });

        /* --- ОСНОВНЫЕ ФУНКЦИИ --- */
        function clearList() {
            if(isProcessing) return;
            document.getElementById('container').innerHTML = '';
            loadedGames = [];
            document.getElementById('copy-btn').style.display = 'none';
            document.getElementById('status-bar').innerText = '';
            document.getElementById('ai-block').style.display = 'none';
        }

        async function copyLibrary() {
            if (loadedGames.length === 0) return;

            // 1. Показываем подтверждение
             const confirmCopy = confirm(`Вы хотите скопировать список всех загруженных игр (${loadedGames.length} шт.) в буфер обмена?`);
    
            if (confirmCopy) {
                 // 2. Собираем только названия игр, разделяя их новой строкой
                 const textToCopy = loadedGames.map(game => game.name).join('\n');

                  try {
                     // 3. Используем современный API для записи в буфер
                     await navigator.clipboard.writeText(textToCopy);
            
                     // 4. Визуальный отклик (кратковременное изменение надписи или алерт)
                    alert("Список игр успешно скопирован в буфер обмена!");
                } catch (err) {
                    console.error('Ошибка при копировании:', err);
                    alert("Не удалось скопировать список. Проверьте разрешения браузера.");
                }
            }
        }

        async function getAI() {
            if (loadedGames.length === 0) { alert("Сначала загрузите игры!"); return; }
            const block = document.getElementById('ai-block');
            block.style.display = 'block';
            block.innerHTML = '<span class="spinner"></span> ИИ анализирует ваш профиль...';
            
            try {
                const resp = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ games: loadedGames, mood: currentMood })
                });
                const data = await resp.json();
                const recs = data.content.recommendations;
                
                if(recs && recs.length > 0) {
                    let html = '<h3 style="color:#fff; margin:0 0 10px 0;">🤖 Рекомендации:</h3><div class="ai-gallery">';
                    // Найдите этот блок внутри getAI() и замените его:
                recs.forEach(r => {
                    html += `
                    <div class="card" style="animation:none; width: 300px;">
                        <a href="https://store.steampowered.com/app/${r.steam_id}" target="_blank" style="text-decoration:none; color:inherit; flex-grow:1;">
                            <img src="${r.image_url}" onerror="this.src='https://via.placeholder.com/280x130/171a21/c7d5e0?text=No+Image'">
                            <div class="info">
                                <h2>${r.name}</h2>
                                
                                <!-- Новая конструкция: Звездочка с тултипом -->
                                <div style="margin-bottom: 6px; display: flex; align-items: center;">
                                    <span class="star-tooltip" data-games="Основано на: ${r.based_on}">⭐</span>
                                    <span style="font-size: 11px; color: #697885;">Наведите, чтобы узнать причину</span>
                                </div>

                                <div class="playtime" style="color: #c7d5e0; margin-top:2px; line-height:1.4; font-size: 12px;">
                                    ${r.ai_reason}
                                </div>
                            </div>
                        </a>
                        <div class="price-block">
                            <div></div>
                            <div class="price">Открыть в Steam</div>
                        </div>
                    </div>`;
                });
                    html += '</div>';
                    block.innerHTML = html;
                } else {
                    block.innerHTML = 'ИИ не дал рекомендаций. Попробуйте сменить настройку или подождать.';
                }
            } catch(e) {
                block.innerHTML = 'Ошибка соединения с AI.';
            }
        }

        // --- В index.html ---

async function loadLibrary(isFriend = false) {
    if (isProcessing) return;
    isProcessing = true;
    
    const statusBar = document.getElementById('status-bar');
    clearList();
    statusBar.innerHTML = '<span class="spinner"></span> Запрашиваем список у Steam...';

    try {
        let url = '/api/get-games-list';
        if (isFriend) {
            const inp = document.getElementById('friend-id').value;
            if(inp) url += `?user_id=${encodeURIComponent(inp)}`;
        }

        const resp = await fetch(url);
        const data = await resp.json();

        if (data.games) {
            const total = data.games.length;
            // Сохраняем базу для ИИ (он может работать уже сейчас!)
            loadedGames = data.games.map(g => ({
                steam_id: g.appid,
                name: g.name,
                playtime_forever: g.playtime_forever,
                image_url: `https://cdn.akamai.steamstatic.com/steam/apps/${g.appid}/header.jpg`,
                price_str: "...",
                genres: ""
            }));

            document.getElementById('copy-btn').style.display = 'inline-block';

            // ШАГ 1: Мгновенная отрисовка "базы"
            statusBar.innerText = `Найдено ${total} игр. Отрисовываем...`;
            loadedGames.forEach(g => addCard(g)); // Рисуем сразу все картинки и названия

            // ШАГ 2: Если игр много (>100), пишем предупреждение о фоновой загрузке
            if (total > 100) {
                statusBar.innerHTML = `✅ Список готов. <span style="color:#a4d007">Цены и жанры подгружаются в фоне...</span>`;
            } else {
                statusBar.innerHTML = `✅ Загружено ${total} игр.`;
            }

            // ШАГ 3: Фоновая догрузка деталей (цены, жанры, скидки)
            startBackgroundSync(data.games);
        }
    } catch (e) {
        statusBar.innerText = "Ошибка соединения";
    } finally {
        isProcessing = false;
    }
}

async function startBackgroundSync(rawList) {
    const statusBar = document.getElementById('status-bar');
    const total = rawList.length;
    let processedCount = 0;

    const playtimes = {};
    const names = {};
    const ids = rawList.map(g => {
        playtimes[g.appid] = g.playtime_forever;
        names[g.appid] = g.name;
        return g.appid;
    });

    try {
        const resp = await fetch('/api/games-batch', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ steam_ids: ids, playtimes: playtimes, game_names: names })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
            const { done, value } = await reader.read();
            
            if (done) {
                // ФИНАЛ: Когда поток данных полностью закрыт
                statusBar.innerHTML = `✅ Загрузка завершена! Обработано деталей: ${processedCount} из ${total}`;
                // Через 5 секунд можно совсем очистить статус, чтобы не мешал
                setTimeout(() => { if(statusBar.innerText.includes('Загрузка завершена')) statusBar.innerText = ''; }, 5000);
                break;
            }

            buffer += decoder.decode(value);
            let lines = buffer.split("\n");
            buffer = lines.pop();

            for (let line of lines) {
                if (!line.trim()) continue;
                try {
                    const fullData = JSON.parse(line);
                    processedCount++;
                    
                    // Обновляем статус в реальном времени (опционально, чтобы видеть движение)
                    if (total > 100 && processedCount % 5 === 0) {
                        statusBar.innerHTML = `⚙️ Синхронизация цен... ${processedCount} / ${total}`;
                    }

                    const idx = loadedGames.findIndex(g => g.steam_id === fullData.steam_id);
                    if (idx !== -1) loadedGames[idx] = fullData;
                    
                    updateCardDetails(fullData);
                } catch(e) { console.error("Ошибка парсинга строки:", e); }
            }
        }
    } catch (e) {
        console.error("Ошибка фоновой синхронизации:", e);
        statusBar.innerHTML = `<span style="color: #ff6c6c;">⚠️ Фоновая загрузка прервана</span>`;
    }
}

// Улучшим функцию обновления, чтобы она убирала "..." если данных нет
function updateCardDetails(game) {
    const cardLink = document.querySelector(`.card a[href*="${game.steam_id}"]`);
    if (!cardLink) return;

    const card = cardLink.closest('.card');
    
    // Жанры
    const genreEl = card.querySelector('.genres');
    if (genreEl) genreEl.innerText = game.genres || "";

    // Блок цены
    const priceBlock = card.querySelector('.price-block');
    let displayPrice = game.price_str;
    
    // Если Steam так и не отдал цену, а в базе ее нет, ставим прочерк вместо "..."
    if (!displayPrice || displayPrice === "...") displayPrice = "—";

    let extraClass = "";
    let priceAttr = "";

    if (displayPrice.startsWith("LOCKED|")) {
        const parts = displayPrice.split("|");
        displayPrice = "Недоступно в РФ";
        priceAttr = `data-price="Цена в мире: ${parts[1]}"`;
        extraClass = "region-locked";
    }

    let priceClass = "price " + extraClass;
    if (displayPrice === "Бесплатно") priceClass += " free";

    let discountHtml = (game.discount_percent > 0 && !extraClass) 
        ? `<div class="discount-badge">-${game.discount_percent}%</div>` 
        : '<div></div>';

    priceBlock.innerHTML = `
        ${discountHtml}
        <div class="${priceClass}" ${priceAttr}>${displayPrice}</div>
    `;
}

        function addCard(game) {
            const div = document.createElement('div');
            div.className = 'card';
            
            let displayPrice = game.price_str || "";
            let priceAttr = "";
            let extraClass = "";
            let hideDiscount = false;

            if (displayPrice.startsWith("LOCKED|")) {
                const parts = displayPrice.split("|");
                displayPrice = "Недоступно в РФ";
                priceAttr = `data-price="Цена в мире: ${parts[1]}"`;
                extraClass = "region-locked";
                hideDiscount = true;
            } 
            else if (displayPrice.includes("Нет в продаже") || displayPrice.includes("Недоступно")) {
                div.style.borderColor = "#ff444455";
                extraClass = "blocked";
            }

            let hours = Math.round(game.playtime_forever / 60);
            let timeStr = hours > 0 ? `${hours} ч. в игре` : "Не запускалась";
            let discountHtml = (game.discount_percent > 0 && !hideDiscount) 
                ? `<div class="discount-badge">-${game.discount_percent}%</div>` 
                : '<div></div>';
            
            let priceClass = "price " + extraClass;
            if (displayPrice === "Бесплатно") priceClass += " free";

            div.innerHTML = `
                <a href="https://store.steampowered.com/app/${game.steam_id}" target="_blank" style="text-decoration:none; color:inherit; flex-grow:1;">
                    <img src="${game.image_url}" loading="lazy" onerror="this.src='https://via.placeholder.com/280x130/171a21/c7d5e0?text=No+Image'">
                    <div class="info">
                        <h2>${game.name}</h2>
                        <div class="genres">${game.genres || ""}</div>
                        <div class="playtime">${timeStr}</div>
                    </div>
                </a>
                <div class="price-block">
                    ${discountHtml}
                    <div class="${priceClass}" ${priceAttr}>${displayPrice}</div>
                </div>
            `;
            document.getElementById('container').appendChild(div);
        }

        function sortGames(type) {
            const container = document.getElementById('container');
            if (loadedGames.length === 0) return;
            container.innerHTML = '';

            loadedGames.sort((a, b) => {
                if (type === 'playtime') return b.playtime_forever - a.playtime_forever;
                if (type === 'price') {
                    const getPriceValue = (s) => {
                        if (!s || s === "Бесплатно") return 0;
                        let targetString = s.startsWith("LOCKED|") ? s.split("|")[1] : s;
                        if (targetString.includes("Нет в продаже") || targetString.includes("Недоступно")) return -1;
                        let clean = targetString.replace(/\s/g, '').replace(',', '.').replace(/[^0-9.]/g, '');
                        let num = parseFloat(clean);
                        return isNaN(num) ? -1 : num;
                    };
                    return getPriceValue(b.price_str) - getPriceValue(a.price_str);
                }
            });
            loadedGames.forEach(addCard);
        }
        
        // --- ФУНКЦИЯ ПОИСКА ---
        function filterGames() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.card'); // Берем все карточки на странице
            
            cards.forEach(card => {
                // Ищем название игры внутри тега h2
                const name = card.querySelector('h2').innerText.toLowerCase();
                if (name.includes(query)) {
                    card.style.display = 'flex'; // Показываем, если есть совпадение
                } else {
                    card.style.display = 'none'; // Прячем, если нет
                }
            });
        }
    </script>
</body>
